# Geliştirme/üretim için temel servisler: app + PostgreSQL + Redis
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ajans
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app:
    build: .
    depends_on: [db, redis]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ajans?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports: ["3000:3000"]

  worker:
    build: .
    depends_on: [db, redis]
    command: ["node", "-r", "tsx/cjs", "src/server/queue/worker.ts"]
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ajans?schema=public"
      REDIS_URL: "redis://redis:6379"

volumes:
  pgdata:
